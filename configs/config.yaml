# =================================================================
# Server Configuration
# =================================================================
server:
  host: "0.0.0.0"
  port: 8080

# =================================================================
# MQTT Broker (Mosquitto - runs natively, no Docker required)
# =================================================================
mqtt:
  host: "localhost"
  port: 1883
  client_id: "noxfort-monitor"

# =================================================================
# Database (SQLite)
# =================================================================
database:
  path: "monitor_logs.db"

# =================================================================
# Alerts
# =================================================================
alerts:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""